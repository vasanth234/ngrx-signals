<div class="login-container">
  <div class="login-box">
    <h1>Login</h1>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          required
        />
      </div>
      <button
        type="submit"
        class="login-btn"
        [disabled]="isLoading()"
      >
        {{ isLoading() ? 'Logging in...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
